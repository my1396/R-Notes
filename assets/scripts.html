<script>
// Simple toggle utility retained
function myFunction(id) {
  var x = document.getElementById(id);
  x.style.display = (x.style.display === 'none') ? 'block' : 'none';
}

// Auto-expand active section and keep all siblings within the same level 1 section open
document.addEventListener('DOMContentLoaded', function() {
  try {
    var summary = document.querySelector('.book-summary ul.summary');
    if (!summary) return;

    function applyAutoOpen() {
      // Find the active item (could be level 1, 2, or 3)
      var active = summary.querySelector('li.chapter.active');
      if (!active) return;
      
      // Find the top-level (level 1) chapter containing the active item
      var topLevelChapter = active.closest('ul.summary > li.chapter');
      if (!topLevelChapter) return;
      
      // Collapse all other top-level chapters
      summary.querySelectorAll('ul.summary > li.chapter').forEach(function(chapter) {
        if (chapter !== topLevelChapter) {
          chapter.classList.remove('auto-open');
          // Collapse all nested items in other chapters
          chapter.querySelectorAll('li.chapter').forEach(function(nested) {
            nested.classList.remove('auto-open');
          });
        }
      });
      
      // Expand the active top-level chapter
      topLevelChapter.classList.add('auto-open');
      
      // Expand ALL level 2 and level 3 items within this top-level chapter
      topLevelChapter.querySelectorAll('li.chapter').forEach(function(nested) {
        nested.classList.add('auto-open');
      });
      
      // Scroll the active TOC item to the center of the TOC panel
      setTimeout(function() {
        var activeLink = active.querySelector('a');
        if (activeLink) {
          activeLink.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 100);
    }

    applyAutoOpen();

    // GitBook emits page.change on navigation
    if (typeof gitbook !== 'undefined' && gitbook.events) {
      gitbook.events.on('page.change', function(){
        applyAutoOpen();
      });
    }
  } catch(e) {
    console.warn('TOC auto-open error', e);
  }
});

// Toggle collapse: clicking level 1 heading expands/collapses all sublevels
document.addEventListener('DOMContentLoaded', function() {
  try {
    var summary = document.querySelector('.book-summary ul.summary');
    if (!summary) return;

    // Add click handlers only to top-level chapter links with children
    summary.querySelectorAll('ul.summary > li.chapter').forEach(function(chapter) {
      var sublist = chapter.querySelector('ul');
      if (!sublist) return; // Only chapters with subsections

      var link = chapter.querySelector('a');
      if (!link) return;

      link.addEventListener('click', function(e) {
        // Check if this chapter is already expanded
        var isExpanded = chapter.classList.contains('auto-open');
        
        if (isExpanded) {
          // Collapse it and all nested items
          e.preventDefault();
          chapter.classList.remove('auto-open');
          // Also collapse all level 2 and level 3 items
          chapter.querySelectorAll('li.chapter.auto-open').forEach(function(nested) {
            nested.classList.remove('auto-open');
          });
        } else {
          // Expand it (collapse other top-level chapters first)
          summary.querySelectorAll('ul.summary > li.chapter.auto-open').forEach(function(li) {
            if (li !== chapter) {
              li.classList.remove('auto-open');
              li.querySelectorAll('li.chapter.auto-open').forEach(function(nested) {
                nested.classList.remove('auto-open');
              });
            }
          });
          chapter.classList.add('auto-open');
          // Expand all level 2 items within this chapter
          chapter.querySelectorAll('ul > li.chapter').forEach(function(level2) {
            level2.classList.add('auto-open');
          });
        }
      });
    });
  } catch(e) {
    console.warn('TOC toggle error', e);
  }
});
</script>
<style>
/* Show all nested UL of chapters marked as auto-open */
.book-summary ul.summary li.chapter.auto-open > ul { 
  display: block !important; 
}

/* Make parent level headings bold when expanded */
.book-summary ul.summary li.chapter.auto-open > a { 
  font-weight: 700; 
}

/* Highlight the actual active item with color and bold */
.book-summary ul.summary li.chapter.active > a { 
  font-weight: 700 !important;
  color: #0078D4 !important;
}

/* Ensure proper indentation for nested levels */
.book-summary ul.summary li.chapter ul li.chapter { 
  padding-left: 0; 
}
</style>
